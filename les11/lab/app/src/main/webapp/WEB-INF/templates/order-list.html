<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список заказов</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; margin: 2px; text-decoration: none; }
        .btn-edit { background-color: #2196F3; color: white; }
        .btn-delete { background-color: #f44336; color: white; }
        .btn-create { background-color: #4CAF50; color: white; padding: 10px; }
    </style>
</head>
<body>
<h1>Управление заказами</h1>
<!-- 👇 ИСПРАВЛЕНА ССЫЛКА -->
<a th:href="@{/web/create-test}" class="btn btn-create">+ Создать новый заказ</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Клиент</th>
        <th>Дата</th>
        <th>Сумма</th>
        <th>Статус</th>
        <th>Адрес</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.orderId}">1</td>
        <td th:text="${order.customer.name}">Клиент</td>
        <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">Дата</td>
        <td th:text="${order.totalPrice}">0</td>
        <td th:text="${order.status}">Статус</td>
        <td th:text="${order.shippingAddress}">Адрес</td>
        <td>
            <a th:href="@{/web/orders/edit/{id}(id=${order.orderId})}" class="btn btn-edit">✏️ Редактировать</a>
            <form method="post" th:action="@{/web/orders/delete/{id}(id=${order.orderId})}" style="display:inline">
                <button type="submit" class="btn btn-delete" onclick="return confirm('Удалить заказ?')">🗑️ Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
